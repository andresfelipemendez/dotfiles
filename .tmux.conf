unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
bind r source-file ~/.tmux.conf
bind x kill-pane
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

set -g mouse on

# Rectangular (block) selection: hold Alt while dragging
bind -T copy-mode M-MouseDrag1Pane select-pane \; send-keys -X begin-selection \; send-keys -X rectangle-toggle

# Cross-platform clipboard integration for copy-mode
# macOS: pbcopy | Linux: xclip/wl-copy | WSL: clip.exe
if-shell "uname | grep -q Darwin" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy' ; \
     bind-key -T copy-mode   M-w send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "uname -r | grep -qi microsoft" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe' ; \
     bind-key -T copy-mode   M-w send-keys -X copy-pipe-and-cancel 'clip.exe'"
if-shell "[ \"$(uname)\" = Linux ] && ! uname -r | grep -qi microsoft && command -v wl-copy >/dev/null 2>&1" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy' ; \
     bind-key -T copy-mode   M-w send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell "[ \"$(uname)\" = Linux ] && ! uname -r | grep -qi microsoft && ! command -v wl-copy >/dev/null 2>&1 && command -v xclip >/dev/null 2>&1" \
    "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard' ; \
     bind-key -T copy-mode   M-w send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'"

set -g base-index 1
setw -g pane-base-index 1

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# statusbar
set -g status-position bottom

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'odedlaz/tmux-onedark-theme'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
